name: CI-ED
on:
  workflow_dispatch: {}
  pull_request: {}
  push:
    branches: [main]
jobs:
  main:
    name: Build, Validate and Deploy Editor's Draft
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: w3c/spec-prod@v2
        with:
          TOOLCHAIN: bikeshed
          GH_PAGES_BRANCH: gh-pages
          SOURCE: Overview.bs
          DESTINATION: index.html
      - name: Deploy implementation report to GitHub Pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          cp implementation-report-2026-03.html /tmp/implementation-report-2026-03.html
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/implementation-report-2026-03.html implementation-report-2026-03.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add implementation-report-2026-03.html
          git diff --cached --quiet || git commit -m "Deploy implementation report"
          git push
